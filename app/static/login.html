<!DOCTYPE html>
<html lang="ru" id="root-html">
<head>
<script>
// Применяем тему и акцент СИНХРОННО до отрисовки — убирает мелькание (FOUC)
(function () {
  try {
    var root = document.documentElement;
    var theme = localStorage.getItem('oops-theme') || 'dark';
    root.setAttribute('data-theme', theme);
    var ACC = {amber:{light:'#D97706',dark:'#E8951F'},terracotta:{light:'#C2612F',dark:'#DB8155'},emerald:{light:'#0F766E',dark:'#2DD4BF'},indigo:{light:'#4F46E5',dark:'#818CF8'},rose:{light:'#BE185D',dark:'#F472B6'},slate:{light:'#475569',dark:'#94A3B8'},ocean:{light:'#0369A1',dark:'#38BDF8'},olive:{light:'#4D7C0F',dark:'#A3E635'}};
    var id = localStorage.getItem('oops-accent') || 'amber';
    var c = ACC[id] || ACC.amber;
    var hex = theme === 'dark' ? c.dark : c.light;
    function mix(a,b,t){a=parseInt(a.slice(1),16);b=parseInt(b.slice(1),16);var ar=(a>>16)&255,ag=(a>>8)&255,ab=a&255,br=(b>>16)&255,bg=(b>>8)&255,bb=b&255;return '#'+((1<<24)+((Math.round(ar*t+br*(1-t)))<<16)+((Math.round(ag*t+bg*(1-t)))<<8)+(Math.round(ab*t+bb*(1-t)))).toString(16).slice(1);}
    var s = root.style;
    s.setProperty('--accent', hex);
    if (theme === 'dark') { s.setProperty('--bg', mix(hex,'#161311',0.06)); s.setProperty('--bg-card', mix(hex,'#211C17',0.04)); }
    else { s.setProperty('--bg', mix(hex,'#F4F0E9',0.06)); s.setProperty('--bg-card', '#FFFFFF'); }
  } catch (e) {}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oops! — вход</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
<style>
:root, :root[data-theme="light"] {
  --bg: #F4F0E9;
  --bg-card: #FFFFFF;
  --bg-elev: #FBF8F2;
  --border: #E9E3D9;
  --border-strong: #DDD5C8;
  --text: #1C1917;
  --text-bright: #0F0D0C;
  --text-dim: #78716C;
  --text-mute: #A8A29E;
  --accent: #D97706;
  --accent-hover: #B45309;
  --accent-on: #FFFFFF;
  --accent-dim: rgba(217, 119, 6, 0.10);
  --danger: #C2410C;
}
:root[data-theme="dark"] {
  --bg: #161311;
  --bg-card: #211C17;
  --bg-elev: #2A241D;
  --border: #332B23;
  --border-strong: #40372C;
  --text: #F4EEE6;
  --text-bright: #FFFFFF;
  --text-dim: #A79E92;
  --text-mute: #6E655B;
  --accent: #E8951F;
  --accent-hover: #F0B45A;
  --accent-on: #1C1917;
  --accent-dim: rgba(217, 119, 6, 0.16);
  --danger: #F58A57;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex; align-items: center; justify-content: center;
  position: relative;
  padding: 20px;
}
.shell {
  width: 100%; max-width: 360px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px;
  font-weight: 600;
  font-size: 15px;
  color: var(--text-bright);
}
.brand-mark {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: var(--accent);
  color: var(--accent-on);
  border-radius: 6px;
  font-weight: 700;
  font-size: 14px;
}
h1 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-bright);
  letter-spacing: -0.015em;
}
.subtitle {
  font-size: 13px;
  color: var(--text-mute);
  margin-bottom: 28px;
}
form { display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
}
input[type="text"], input[type="password"] {
  background: var(--bg);
  border: 1px solid var(--border-strong);
  padding: 9px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  border-radius: 6px;
  transition: border-color 0.12s, box-shadow 0.12s;
}
input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.error {
  font-size: 13px;
  color: var(--danger);
  padding: 9px 12px;
  border: 1px solid var(--danger);
  background: rgba(250, 112, 128, 0.08);
  border-radius: 6px;
}
.error.hidden { display: none; }
button[type="submit"] {
  margin-top: 6px;
  background: var(--accent);
  color: var(--accent-on);
  border: 1px solid var(--accent);
  padding: 10px 16px;
  font-family: inherit;
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.12s, border-color 0.12s;
}
button[type="submit"]:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.hint {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-mute);
}
.hint code {
  color: var(--text);
  background: var(--bg-elev);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
}
.theme-toggle-login {
  position: absolute; top: 20px; right: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  width: 32px; height: 32px;
  display: grid; place-items: center;
  cursor: pointer;
  color: var(--text-dim);
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.12s;
}
.theme-toggle-login:hover { color: var(--text); border-color: var(--border-strong); }
</style>
</head>
<body>
  <button class="theme-toggle-login" id="theme-toggle" title="Сменить тему">
    <span id="theme-icon">☾</span>
  </button>
  <div class="shell">
    <div class="brand">
      <div class="brand-mark">O</div>
      <span>Oops!</span>
    </div>

    <h1>Вход</h1>
    <p class="subtitle">Учёт подписок организации</p>

    <form id="login-form">
      <div class="field">
        <label for="username">Логин</label>
        <input type="text" id="username" required autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <div id="error" class="error hidden"></div>
      <button type="submit">Войти</button>
    </form>

    <div class="hint">
      По умолчанию: <code>admin</code> / <code>admin</code>
    </div>
  </div>

<script>
const root = document.getElementById('root-html');
const themeIcon = document.getElementById('theme-icon');
const savedTheme = localStorage.getItem('oops-theme') || 'dark';
root.setAttribute('data-theme', savedTheme);
themeIcon.textContent = savedTheme === 'dark' ? '☾' : '☀';

// Применение выбранного акцента (синхронно с основным приложением)
const ACCENTS = {
  amber:{light:'#D97706',dark:'#E8951F'}, terracotta:{light:'#C2612F',dark:'#DB8155'},
  emerald:{light:'#0F766E',dark:'#2DD4BF'}, indigo:{light:'#4F46E5',dark:'#818CF8'},
  rose:{light:'#BE185D',dark:'#F472B6'}, slate:{light:'#475569',dark:'#94A3B8'},
  ocean:{light:'#0369A1',dark:'#38BDF8'}, olive:{light:'#4D7C0F',dark:'#A3E635'},
};
function _shade(hex,pct){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;const t=pct<0?0:255,p=Math.abs(pct)/100;r=Math.round((t-r)*p)+r;g=Math.round((t-g)*p)+g;b=Math.round((t-b)*p)+b;return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function _hexA(hex,a){const n=parseInt(hex.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function _mix(hex,base,t){const a=parseInt(hex.slice(1),16),b=parseInt(base.slice(1),16);const ar=(a>>16)&255,ag=(a>>8)&255,ab=a&255;const br=(b>>16)&255,bg=(b>>8)&255,bb=b&255;return '#'+((1<<24)+((Math.round(ar*t+br*(1-t)))<<16)+((Math.round(ag*t+bg*(1-t)))<<8)+(Math.round(ab*t+bb*(1-t)))).toString(16).slice(1);}
function applyAccent(){
  const id = localStorage.getItem('oops-accent') || 'amber';
  const theme = root.getAttribute('data-theme');
  const c = ACCENTS[id] || ACCENTS.amber;
  const hex = theme === 'dark' ? c.dark : c.light;
  const s = root.style;
  s.setProperty('--accent', hex);
  s.setProperty('--accent-hover', _shade(hex, theme==='dark'?20:-20));
  s.setProperty('--accent-dim', _hexA(hex, theme==='dark'?0.16:0.10));
  s.setProperty('--accent-on', '#ffffff');
  if (theme === 'dark') {
    s.setProperty('--bg', _mix(hex,'#161311',0.06));
    s.setProperty('--bg-card', _mix(hex,'#211C17',0.04));
  } else {
    s.setProperty('--bg', _mix(hex,'#F4F0E9',0.06));
    s.setProperty('--bg-card', '#FFFFFF');
  }
}
applyAccent();

document.getElementById('theme-toggle').addEventListener('click', () => {
  const current = root.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  themeIcon.textContent = next === 'dark' ? '☾' : '☀';
  localStorage.setItem('oops-theme', next);
  applyAccent();
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  errEl.classList.add('hidden');
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      }),
      credentials: 'include'
    });
    if (r.ok) {
      window.location.href = '/';
    } else {
      const data = await r.json();
      errEl.textContent = data.detail || 'Ошибка входа';
      errEl.classList.remove('hidden');
    }
  } catch (err) {
    errEl.textContent = 'Не удалось подключиться к серверу';
    errEl.classList.remove('hidden');
  }
});
</script>
</body>
</html>
