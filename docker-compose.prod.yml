services:
  oops:
    image: ghcr.io/vyalu/oops:latest
    container_name: oops
    restart: unless-stopped
    ports:
      - "8383:8000"          # внешний порт : внутренний. Меняйте левое число под себя.
    environment:
      - TZ=Europe/Moscow
      # SECRET_KEY сгенерируется автоматически и сохранится в data/secret.key.
      # Чтобы задать свой — раскомментируйте:
      # - SECRET_KEY=впишите-длинную-случайную-строку
    volumes:
      - ./data:/app/data     # база, логотипы, бэкапы — хранятся на хосте
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
